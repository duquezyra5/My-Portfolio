<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .split-container {
      display: flex;
      width: 100%;
      max-width: 980px;
      min-height: 580px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      background: white;
    }

    /* Left - Login Form */
    .login-side {
      flex: 1;
      padding: 60px 50px;
      background: violet;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-side h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 50px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #555;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      background: #fafa;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff8c42;
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.12);
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 32px;
      font-size: 0.92rem;
    }

    .forgot-password a {
      color: #ff8c42;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-password a:hover {
      text-decoration: underline;
      color: #e062f;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-login {
      background: #ff8c42;
      color: white;
      margin-top: 12px;
    }

    .btn-login:hover {
      background: #f57c32;
      transform: translateY(-1px);
    }

    /* Right - Welcome / Signup */
    .welcome-side {
      flex: 1;
      background: #f7b69c;
      color: #333;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .welcome-side h2 {
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #e06c2f;
    }

    .welcome-side p {
      font-size: 1.25rem;
      line-height: 1.5;
      margin-bottom: 40px;
      color: #444;
    }

    .btn-signup {
      display: inline-block;
      background: #ff8c42;
      color: white;
      padding: 14px 60px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.25s;
    }

    .btn-signup:hover {
      background: #f57c32;
      transform: scale(1.06);
    }

    @media (max-width: 850px) {
      .split-container {
        flex-direction: column;
        min-height: auto;
      }
      .login-side, .welcome-side {
        padding: 50px 30px;
      }
      .welcome-side {
        order: -1;
      }
    }
  </style>
</head>
<body>

  <div class="split-container">

    <div class="login-side">
      <h1>Login</h1>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">User Name</label>
          <input type="text" id="username" placeholder="Enter your username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <div class="forgot-password">
          <a href="forgot-password.html">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-login">Login</button>
      </form>
    </div>

    <div class="welcome-side">
      <h2>Welcome!</h2>
      <p>Don't have an account?</p>
      <a href="signup.html" class="btn-signup">Sign Up</a>
    </div>

  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault(); // Prevent default form submission

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // Simple validation: Check if fields are not empty (customize as needed)
      if (username && password) {
        // Simulate successful login (in a real app, check against a backend)
        alert('Login successful! Redirecting to homepage...');
        window.location.href = 'homepages.html'; // Redirect to homepage
      } else {
        alert('Please enter both username and password.');
      }
    });
  </script>

</body>
</html>

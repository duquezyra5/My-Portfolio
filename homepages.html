
   <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name | Home</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    /* ============== RESET & BASE ============== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: #0f0f1a;
      color: #e0e0ff;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ============== HEADER / NAV ============== */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(15, 15, 26, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(100, 100, 255, 0.12);
      transition: all 0.3s ease;
    }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.2rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: #a5b4fc;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: #c7d2fe;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #818cf8;
    }

    /* ============== HERO SECTION ============== */
    .hero {
      height: 100vh;
      min-height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 0 5%;
    }

    .hero-content {
      max-width: 900px;
    }

    .hero h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #a5b4fc, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }

    .hero p {
      font-size: 1.35rem;
      margin-bottom: 2.5rem;
      color: #94a3b8;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      background: #6366f1;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #4f46e5;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.35);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #818cf8;
      color: #a5b4fc;
      margin-left: 1.2rem;
    }

    .btn-outline:hover {
      background: rgba(129, 140, 248, 0.1);
    }

    /* ============== SOCIAL ICONS ============== */
    .socials {
      margin-top: 3.5rem;
      display: flex;
      justify-content: center;
      gap: 1.8rem;
    }

    .socials a {
      color: #94a3b8;
      font-size: 1.8rem;
      transition: all 0.3s ease;
    }

    .socials a:hover {
      color: #a5b4fc;
      transform: translateY(-4px);
    }

    /* Make content visible under fixed header */
    main {
      padding-top: 80px;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#" class="logo">My home pages</a>
      <ul class="nav-links">
        <li><a href="#home">familya</a></li>
        <li><a href="#about">education</a></li>
        <li><a href="#projects">collection</a></li>
        <li><a href="#contact">self</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-content">
        <h1>Hello, I'm <br>zy</h1>
        <p>Full-Stack Developer • UI/UX Enthusiast • Creating beautiful digital experiences</p>
        
        <div>
          <a href="#projects" class="btn">signup</a>
          <a href="#contact" class="btn btn-outline">log in</a>
        </div>

        <div class="socials">
          <a href="#"><i class="fab fa-github"></i></a>
          <a href="#"><i class="fab fa-linkedin-in"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
